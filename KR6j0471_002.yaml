body:
  text: 西天中印度摩伽陀國那爛陀寺三藏賜紫沙門臣法護奉詔譯爾時金剛手菩薩摩訶薩顧𥌊曼拏攞衆目如師子威德自在為伊舍那天步多主說大力明王曼拏攞法告言聖者若有入此大忿怒曼拏攞中者即能成就一切事業命無中夭遠離一切惡病纏身不生魔界一切衆生見者歡喜復能遠離一切冤家於後一切真言教法悉得成就復能成就一切忿怒得一切灌頂中福故吉祥莊嚴是時先安布此大忿怒曼拏攞念此經一萬遍得善境界得覩此曼拏攞教主印可然後方學此真言壇法先須八日不食歸命三寶發大慈悲菩提心故依時作法成就事故關閉冤家死者還活此忿怒大威德能令大業魔王歸依三寶佛法僧衆況復一切惡魔鬼魅而不殄滅此大力明王若有受持之者即能降伏一切冤魔一切藥叉洛乞叉二合畢哩二合哆羯吒布怛曩拏倪寧娑𠆙切身薩嗘攞迦波三麼二合囉離如是等一切怕怖一切枷鎖一切中天一切迷惑一切疫病禁繫貧窮此正法若有讀誦受持復得一切財寶無所乏少若天早時於七晝夜中讀誦此大力明王即降大雨若不降雨令彼天衆破壞殄滅羯哩二合瑟拏二合龍王設羯囉二合龍王阿難多龍王如是等龍王衆令降大雨若不降時亦令彼死又復此經如前依法於四方河岸海岸池潭四邊舍利塔前以金剛手大菩薩以赤栴檀迦囉尾囉花紅蓮花阿底目羯哆二合花繒綵幢幡皆以赤色香水滿瓶如法依時精勤念誦得大福聚又復或以樺皮書此大力明王真言安於旌旗之上或以頂戴即得入陳無傷相敵得勝弓箭槍刀如花被體見者歡喜而生愛敬爾時魔王繞佛三匝退坐一面白佛言世尊云何名大力佛告魔王如來名大力法藏名大力法名大力法眼名大力大乘名大力金剛手名大力爾時魔王讚金剛手祕密主言善哉善哉祕密主我從今向去不敢惱亂一切修行之者誓歸三寶佛法僧衆願為優婆塞常持淨戒願天解脫為我安樂我為法衆擁護受持大力明王及諸衆生爾時世尊告魔王言業種此經若有受持讀誦即得遠離地獄餓鬼畜生閻羅王界種種苦惱當得生天經二十千劫常為天主下生閻浮後為金輪王王四天下於未來世復得阿耨多羅三藐三菩提此大力明王乃至清淨不清淨食與不食淨戒不淨戒俱無障礙但持此真言所求皆得何況依法淨戒無所不從爾時尊者須菩提與自衆俱來在會坐從座而起白佛言世尊云何受持此大力明王心陀羅尼而得解脫佛言須菩提汝問金剛手祕密主故時須菩提即白金剛手言祕密主云何受持此大力明王心所得何果金剛手言得倉庫盈滿名衣上服金銀珍寶象馬牛羊所求施與須菩提言有如是等廣大果報金剛手言須菩提如是如是乃至盡衆生煩惱果報故為住功德果故至阿耨多羅三藐三菩提功德道故須菩提言善哉善哉金剛手以祕密相種種莊嚴有大智力灌頂辨才得無相施大戒大智慧大福大力大威德大功德頂此大力明王經得十方諸佛同來灌頂金剛手此經威德為諸如來摩頂授記得大安樂此陀羅尼或於山間石壁曠野陂湖江河池潭受持讀誦遠離一切怖畏爾時金剛手菩薩摩訶薩白世尊言此經若有持者復為他說壽命百歲無諸橫苦金剛手復白世尊言此正法得福如是當何名之復云何受持佛言金剛手此經名出生一切如來故亦名法遍照故亦名法眼故亦名一切義成就故亦名一切如來法雲故亦名盡一切業障總持故亦名成就一切明王故亦名般若波羅蜜多故亦名一切如來最初法界故亦名大力明王故金剛手若有聞此正法能受持讀誦書寫供養如供養過去未來現在諸佛世尊全身舍利塔故金剛手言善哉善哉佛說如是甚深微妙正法功德變化莊嚴我當受持佛言金剛手若有善男子善女人受持此正法者彼諸業障如河岸樹速疾破壞應以塗香燒香及衆妙花種種幢幡等而作供養即獲廣大無量無邊福德藏故離諸障難若受持讀誦解說此經之地彼諸天龍阿修羅乾闥婆等一切人天常以守護供養一切魔王不敢違越此大力明王心若常憶念即得八千菩薩及諸如來諸大神仙天人龍王阿修羅乾闥婆等稱揚讚歎于時釋迦牟尼如來復告金剛手言若有輕慢生高舉心者當墮八大地獄金剛手若有受持讀誦為他解說供養恭敬尊重讚歎即得無量無邊伏藏故若聞一字一句即得究竟不退菩薩道時金剛手言如來之法極大甚深微妙難測不可量不可思不可議時諸衆生心自迷惑而不能了佛言金剛手此經為一切衆生說為勸誘一切衆生故為欲安樂一切衆生故為增益一切衆生故為令一切衆生得灌頂故為一切衆生離諸貧窮滅諸業障得大吉祥故為令一切衆生得阿耨多羅三藐三菩提故時八千菩薩聞是說已繞佛三匝合掌恭敬讚言善哉善哉釋迦牟尼如來善說此法彼諸菩薩為釋迦牟尼如來名故復作是言如是如是世尊此實善說爾時世尊告金剛手言祕密主我說此大力威德法門攝諸魔王眷屬皆悉來集一切障難更不復作一切所求皆得圓滿乃至阿耨多羅三藐三菩提爾時世尊復說此陀羅尼即說呪曰曩謨引囉怛曩二合怛囉二合夜引野曩莫入室戰二合拏嚩日囉二合引播引拏曳魔賀引藥叉細引曩引跋跢曳怛儞也二合他引唵引賀曩賀曩嚩日囉二合那賀那賀嚩日囉二合末他末他嚩日囉二合入嚩二合攞八嚩二合攞嚩日囉二合鉢囉二合入嚩二合攞鉢囉二合入嚩二合攞嚩日囉二合蘇嚕蘇嚕母嚕母嚕割𧯫割𪘨陟皆反惹曳引尾惹曳引阿𡁠帝引阿波囉引𡁠帝引摩引囉賽引𩕳野二合鉢囉二合摩㗚那二合寧引曳婆嚩二合賀引婆誐嚩引七可反曩引賀引嚩日囉二合播引抳入虞醯野二合割地鉢底薩㗚嚩二合尾垠曩二合上苦恨反尾曩引野迦引喃引怛㗚惹二合怛㗚惹二合滿馱滿馱尾特嚩二合娑曩迦囉阿悉馱引喃引悉弟迦囉迦囉悉馱引喃引阿尾曩引舍迦囉薩㗚嚩二合沒馱地薩怛嚩二合引喃引麼引尾舍迦囉薩㗚味二合禰引嚩引曩引誐遏誐蹉摩賀引麼攞嚩日囉二合嚕二合引馱囉引惹鉢囉二合怕引微引曩麼麼稱名薩㗚嚩二合薩怛嚩二合引喃引佐洛乞叉二合洛乞叉二合娑嚩二合悉釘二合婆𢱍覩佛告金剛手菩薩摩訶薩一切魔王并諸眷屬聞此大力威德法時各各心生恐怖悚栗慞惶如是以此大力忿怒明王威德力故常用護持一切衆生作大安樂息諸災難憐愍饒益毀諸惡毒破壞蠱魅為發大乘心者演說妙法者於佛法僧令得久住爾時文殊師利法王子從座而起偏袒右肩右膝著地合掌向佛白佛言世尊云何佛說一切緣行為無常相佛告文殊師利汝今諦聽一切緣行如乾闥婆城無有實相如電光如浮雲如霧如舍宅風中燭水上漚芭蕉心如諸畫相如空中花如夢幻影響如苦樂輪回如一切瀑河如一切海波如是如是此一切衆生從緣所生而不能知不能見不能思惟不能解了唯佛能知如是見如是思惟如是解了何以故一切緣行即空相故即真實空故畢竟空故即三空故空空應如是解何以故即大空故即如來空故如是如是知如是見如是思惟如是解了菩薩摩訶薩得如是相故佛復告文殊師利法王子言若菩薩摩訶薩行檀波羅蜜多羼提波羅蜜多精進波羅蜜多禪波羅蜜多般若波羅蜜多亦應如是相而解了故爾時觀自在菩薩摩訶薩白佛言世尊云何此經名出生如來相佛語觀自在此經若如來滅後廣作佛事是故此經名生如來相若此經滅後佛法隨滅名生如來相此經若住佛法亦住是故名生如來相何以故此經一切菩薩恆時奉事禮敬故以是義故名生如來相是時觀自在菩薩摩訶薩復白佛言世尊此經若有受持讀誦為他解說我即為彼而來護持佛言此經威德能令一切菩薩摩訶薩及諸天人皆悉來集是諸菩薩同時讚言善哉善哉世尊我等樂聞當為說之佛言此金剛手大力祕密心能施一切衆生安樂故爾時金剛祕密主白佛言世尊此經云何名最初法界相佛言善男子諦聽此經一切如來出生已經三十二日坐大目真鄰陀山入大力三摩地說之故名最初法界相此經一切衆生初發心即住菩提道故名最初法界相此經威德能令無量無邊菩薩摩訶薩得一切現前三摩地名最初法界相又此經威德能令無量無邊衆生得聲聞道故名最初法界相金剛手若有受持讀誦為他解說一切如來皆如一子遠離輪回命終之後至涅槃道故金剛手言諸佛大悲心常救度一切衆生令離輪回脫諸苦難常說牟尼大智慧法滌蕩衆生煩惱穢種佛言善哉善哉祕密主若有受持讀誦為他解說供養恭敬自書若使人書諦觀思惟常時憶念是人即得俱胝三摩地復見俱胝如來并諸菩薩一切眷屬應以廣大供養尊重恭敬衣服臥具飲食湯藥一切所須皆悉奉施得大安樂是善男子所種善根得阿耨多羅三藐三菩提故皆是得聞彼諸如來應正等覺所說妙法憶持不忘復得金剛手菩薩威德力故此大力威德忿怒王常以護持成就安樂一切衆生爾時世尊說是經已十方來會金剛手菩薩觀自在菩薩文殊師利金剛藏等一切悲智菩薩摩訶薩尊者須菩提諸大聲聞及諸衆生一切世間天人龍王阿修羅乾闥婆等聞佛所說歡喜而退大力明王心真言怛儞也二合他引唵引嚩日囉二合嚕二合馱摩賀引麼攞賀曩那賀鉢左末他尾枳囉尾特嚩二合娑野惹徵攞耄引那羅塢麁澀麼二合嚕二合馱吽引𠷑吒遏阿引去鴦鳥剛反惡入𤚥引醯引娑嚩二合賀引
